# Feature List                            Edit, add or remove features to be presented.
features                                  :

  - title                                 : ロック画面ウィジェット対応
    description                           : iPhoneをロックしたままタップでカウント。スロット中も画面を開かずに小役を記録できます。（iOS 17以上）
    fontawesome_icon_name                 : lock

  - title                                 : 8種類の小役を同時管理
    description                           : ベル・スイカ・チェリー・チャンス目・BIG・REG・AT・中段チェリーをあらかじめ設定済み。よく使う小役をすぐにカウントできます。
    fontawesome_icon_name                 : th

  - title                                 : リアルタイム確率表示
    description                           : 自己ゲーム数 ÷ カウント数で確率を自動計算。1/XX.X 形式でリアルタイム表示されます。
    fontawesome_icon_name                 : chart-bar

  - title                                 : 複数機種の切り替え
    description                           : 機種ごとにデフォルト設定を保存・管理。複数の台を打ち分けても設定をすぐに呼び出せます。
    fontawesome_icon_name                 : exchange-alt

  - title                                 : 減算モード
    description                           : ミスカウントをその場ですぐ修正。トグルひとつで減算モードに切り替えられます。
    fontawesome_icon_name                 : minus-circle



